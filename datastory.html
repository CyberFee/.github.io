      <h1>Data Storytelling: Under the Amazon Effect: An Equity Lens</h1>
      <h2>Who Benefits? Who is Burdened? Unpacking Environmental and Economic Equity in South Fulton's Warehouse Boom</h2>
    
      <h2>Project Overview and Methods</h2>
      <p>This project examines Amazon's warehouse expansion in South Fulton County in Atlanta, Georgia using spatial and demographic mapping. The analysis overlays warehouse locations with multiple data layers: demographic census data, infrastructure data on traffic, Atlanta roads and utilities (power and water), economic indicators related to housing and cost of living, and environmental factors including air, noise, light, and habitat disruption. This approach explores the disproportionate impact on historically marginalized Black communities in the South Fulton area and within the City of South Fulton.</p>
    
      <h2>Key Insights</h2>
      <p>This preliminary analysis sets the foundation for additional exploration of a pattern of corporate location decisions that disproportionately and systematically target already vulnerable communities. The data demonstrate that Amazon warehouses, while framed as economic development, perpetuate and mirror historic patterns of redlining and highway construction, de-prioritizing profit over community well-being. The financial burden on these communities far exceeds the wages workers receive and compounds existing environmental and social costs.</p>
